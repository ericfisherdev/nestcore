sonar.projectKey=ericfisherdev_nestcore
sonar.organization=ericfisherdev-os


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=nestcore
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=.

# Explicit test classification.
#
# Left unset, the Go analyzer and the text/secrets analyzer apply *different*
# heuristics and disagree about what a test is: the Go analyzer keys off the
# "_test.go" suffix (35 files at time of writing), while the secrets analyzer
# also treats any directory named -- or ending in -- "test"/"tests"/"doc"/"docs"
# as tests, and so skipped 37 files. The two extra were crypto/cryptotest and
# db/dbtest: exported helper packages that other modules import, which should be
# scanned like any other public API rather than waved through as test fixtures.
#
# Restricting tests to "*_test.go" makes the classification explicit and
# identical for every sensor.
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Coverage profiles, both handed to the scan as workflow artifacts. Go's native
# -coverprofile format is read directly, so no conversion step is needed.
#
# Two files, not one, and both are required. `make test` runs without a database
# so every database-gated test self-skips, leaving db/... looking almost
# untested; `make test-gated` runs those same packages against a real Postgres.
# Sonar unions the reports, so a line covered by either run counts as covered.
# Dropping the second path silently costs about nine points of coverage and
# fails the quality gate.
sonar.go.coverage.reportPaths=coverage.out,coverage.gated.out
